name: Daily POLITICO News Email

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 22:00 EST
  workflow_dispatch:

env:
  kimi_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: HZ-lu2007@outlook.com
  EMAIL_FROM: kimberagent@163.com
  SMTP_HOST: smtp.163.com
  SMTP_PORT: 465
  SMTP_USER: kimberagent@163.com
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      # Step 1: 抓取新闻
      - name: Fetch RSS news
        run: python rss_parser.py

      # Step 2: 仅翻译今日的文章
      - name: Translate today's news
        run: |
          TODAY=$(TZ='America/New_York' date +%Y%m%d)
          FILE="dailynews/${TODAY}.md"
          if [ -f "\$FILE" ]; then
            echo "Found: \$FILE"
            python translate_news.py "\$FILE"
          else
            echo "No today's news: \$FILE"
            ls dailynews/
          fi

      # Step 3: 仅发送今日的翻译邮件
      - name: Send today's email
        run: |
          TODAY=$(TZ='America/New_York' date +%Y%m%d)
          FILE="translate/${TODAY}.md"
          if [ -f "\$FILE" ]; then
            echo "Found: \$FILE"
            python send_email.py "\$FILE"
          else
            echo "No translated file for today, skipping email"
          fi
